name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    # 强制使用 22.04 以确保旧版依赖库（如 libtinfo5）可用
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk python3-pip autoconf \
            libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            build-essential libsqlite3-dev sqlite3 bzip2 libbz2-dev \
            libreadline-dev libgdbm-dev libdb5.3-dev libexpat1-dev \
            liblzma-dev libffi-dev
          pip install --upgrade pip
          pip install buildozer cython==0.29.33

      - name: Build APK with Buildozer
        run: |
          # 自动接受协议并开始
          yes | buildozer android debug
        env:
          BUILDOZER_ALLOW_ORG_NAME_START_WITH_NUM: 1
          # 设置编码，防止打包过程中的字符集报错
          LC_ALL: en_US.UTF-8
          LANG: en_US.UTF-8

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: daledou-android-apk
          path: bin/*.apk
          retention-days: 7
